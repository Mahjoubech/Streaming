version: '3.8'

services:
  discovery-service:
    build: ./discovery-service
    ports:
      - "8761:8761"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8761/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 5

  config-service:
    build: ./config-service
    ports:
      - "8888:8888"
    depends_on:
      discovery-service:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=native
      - SPRING_CLOUD_CONFIG_SERVER_GIT_URI=file:///c:/projects/streaming-app/config-repo

  gateway-service:
    build: ./gateway-service
    ports:
      - "8080:8080"
    depends_on:
      - discovery-service
      - config-service

  video-service:
    build: ./video-service
    ports:
      - "8081:8081"
    depends_on:
      - discovery-service
      - config-service

  user-service:
    build: ./user-service
    ports:
      - "8082:8082"
    depends_on:
      - discovery-service
      - config-service
      - video-service

  security-service:
    build: ./security-service
    ports:
      - "8083:8083"
    depends_on:
      - discovery-service
      - config-service

  monitoring-service:
    build: ./monitoring-service
    ports:
      - "8084:8084"
    depends_on:
      - discovery-service
